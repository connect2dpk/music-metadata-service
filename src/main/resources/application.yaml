spring:
  application:
    name: music-metadata-service

  docker:
    compose:
      # We run docker compose explicitly when needed; don't auto-start it on app boot.
      enabled: false

  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: 3600

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/musicdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:s3cr3t}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    org.flywaydb: INFO
  file:
    name: /logs/application.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [corr=%X{correlationId}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [corr=%X{correlationId}] - %msg%n"