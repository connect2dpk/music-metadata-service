spring:
  application:
    name: music-metadata-service

  docker:
    compose:
      # We run docker compose explicitly when needed; don't auto-start it on app boot.
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/musicdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:s3cr3t}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    org.flywaydb: INFO