spring:
  application:
    name: music-metadata-service-test

  docker:
    compose:
      enabled: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

logging:
  level:
    org.flywaydb:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [corr=%X{correlationId}] - %msg%n"